[agent]
name = "minecraft-host-1"
bind = "0.0.0.0"
port = 8766
token_env = "MC_AGENT_TOKEN"

[[servers]]
id = "survival"
name = "Survival"
working_directory = "/srv/minecraft/survival"
timeout_seconds = 120
update_timeout_seconds = 1800

# Optional read-only Paper player list. Paper must have enable-query=true and
# query.port must match this UDP port. Use an address this same host can reach.
[servers.player_query]
host = "127.0.0.1"
port = 25565
timeout_seconds = 3

# Every entry is an argv array (or a list of argv arrays). No shell is used.
[servers.actions]
start = [["sudo", "-n", "/usr/bin/systemctl", "start", "minecraft@survival.service"]]
stop = [["sudo", "-n", "/usr/bin/systemctl", "stop", "minecraft@survival.service"]]
restart = [["sudo", "-n", "/usr/bin/systemctl", "restart", "minecraft@survival.service"]]
status = [["/usr/bin/systemctl", "is-active", "--quiet", "minecraft@survival.service"]]
update = [["sudo", "-n", "/usr/local/sbin/update-minecraft-jar", "survival"]]

# Script names become choices in Discord and the web UI.
[servers.scripts]
backup = [["sudo", "-n", "/usr/local/sbin/backup-minecraft", "survival"]]
# Optional: used by the controller UPS monitor after it stops this server.
shutdown_host = [["sudo", "-n", "/usr/sbin/shutdown", "-h", "+1", "UPS on battery; Minecraft Manager requested host shutdown"]]

# Add another [[servers]] block when one machine hosts multiple servers.
