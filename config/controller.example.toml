[controller]
# Keep the dashboard local to the Pi. Tailscale Serve exposes it privately.
bind = "127.0.0.1"
port = 8080

[discovery]
enabled = true
port = 8765
agent_registry_file = "/var/lib/minecraft-manager/paired-agents.json"

[auth]
web_username = "admin"
web_password_env = "MC_WEB_PASSWORD"
session_secret_env = "MC_SESSION_SECRET"
# Set true only when the dashboard is behind HTTPS.
cookie_secure = false

[discord]
discord_token_env = "DISCORD_BOT_TOKEN"
# Using one guild makes new slash commands appear quickly during setup.
guild_id = 123456789012345678
# Optional: post once here whenever the controller process comes online.
announcement_channel_id = 123456789012345678
# Show the controller health on the bot member as:
# Watching Minecraft servers • All Good, Caution, or Attention.
health_presence_enabled = true
health_poll_interval_seconds = 30
# A Discord administrator is always permitted. These lists grant other access.
allowed_user_ids = [123456789012345678]
allowed_role_ids = [123456789012345678]

[instructions]
# Public Discord response for /instructions. Discord messages are limited to
# 2,000 characters. Markdown is supported and mentions are always suppressed.
message = """
***HOW TO JOIN MONKEYCRAFT***

**Java Edition - Windows, macOS, or Linux**
Go to **Multiplayer -> Add Server**.
**Server Address:** `monkeycraft.monkeyservers.net:20208`
Click **Done**, select Monkeycraft, and click **Join Server**.

**Bedrock Edition - Windows, iPhone/iPad, or Android**
Go to **Play -> Servers -> Add Server**.
**Server Name:** `Monkeycraft`
**Server Address:** `monkeycraft.monkeyservers.net`
**Port:** `20210`
The server name cannot be empty. Click **Add and Play**.

**Console Bedrock Edition - Xbox, PlayStation, Nintendo Switch, and Switch 2**
No mobile app, DNS changes, ads, or server address entry are required.

**First-time setup:**
1. Sign in to Minecraft with your Microsoft account.
2. Go to **Play -> Friends -> Add Friend/Find Cross-Platform Friends**.
3. Search for and add **`Monkeycraft5823`**.
4. Wait up to one minute for it to add you back.
5. Return to **Play -> Friends -> Joinable Friends**.
6. Select the Monkeycraft session and join.

After setup, open **Play -> Friends** and select the server whenever you want to play.

If it does not appear, fully close and reopen Minecraft. Make sure cross-network multiplayer is allowed and you have the required console subscription: Nintendo Switch Online, PlayStation Plus, or Xbox Game Pass Core.
"""

[player_tracking]
# Optional Discord messages for Paper player sessions. The message is edited
# when a player changes servers and finalized when they leave the network.
enabled = false
# Uses discord.announcement_channel_id when channel_id is omitted.
poll_interval_seconds = 5
leave_grace_seconds = 10

[ups]
# Optional NUT integration for a USB UPS attached to the Pi controller.
# For your CyberPower SX950U, configure NUT first, then set ups_name to the
# name that works with: upsc UPS_NAME ups.status
enabled = false
ups_name = "cyberpower"
status_command = ["/usr/bin/upsc", "cyberpower", "ups.status"]
# Optional. Defaults to the same upsc target as status_command.
charge_command = ["/usr/bin/upsc", "cyberpower", "battery.charge"]
# Keep one editable UPS status message in Discord. It uses the announcement
# channel unless discord_status_channel_id is set to another text channel ID.
discord_status_enabled = true
# discord_status_channel_id = 123456789012345678
# If NUT reports OB or LB for this long, the controller starts shutdown steps.
on_battery_delay_seconds = 30
poll_interval_seconds = 15
stop_timeout_seconds = 180
# Each agent can expose this script to shut down its Ubuntu host after stop.
downstream_shutdown_script = "shutdown_host"
local_shutdown_delay_seconds = 15
local_shutdown_command = ["/usr/bin/systemctl", "poweroff"]

[[servers]]
id = "velocity"
name = "Velocity"
agent_url = "http://192.168.1.35:8766"
token_env = "MC_AGENT_TOKEN_HOST2"
# Velocity is the proxy, not a Paper backend. Do not set track_players here.

[[servers]]
id = "lobby"
name = "Lobby"
agent_url = "http://192.168.1.35:8766"
token_env = "MC_AGENT_TOKEN_HOST2"
track_players = true

[[servers]]
id = "survival"
name = "Vanilla"
agent_url = "http://192.168.1.16:8766"
token_env = "MC_AGENT_TOKEN_HOST1"
track_players = true
