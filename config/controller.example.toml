[controller]
# Keep the dashboard local to the Pi. Tailscale Serve exposes it privately.
bind = "127.0.0.1"
port = 8080

[auth]
web_username = "admin"
web_password_env = "MC_WEB_PASSWORD"
session_secret_env = "MC_SESSION_SECRET"
# Set true only when the dashboard is behind HTTPS.
cookie_secure = false

[discord]
discord_token_env = "DISCORD_BOT_TOKEN"
# Using one guild makes new slash commands appear quickly during setup.
guild_id = 123456789012345678
# Optional: post once here whenever the controller process comes online.
announcement_channel_id = 123456789012345678
# A Discord administrator is always permitted. These lists grant other access.
allowed_user_ids = [123456789012345678]
allowed_role_ids = [123456789012345678]

[ups]
# Optional NUT integration for a USB UPS attached to the Pi controller.
# For your CyberPower SX950U, configure NUT first, then set ups_name to the
# name that works with: upsc UPS_NAME ups.status
enabled = false
ups_name = "cyberpower"
status_command = ["/usr/bin/upsc", "cyberpower", "ups.status"]
# If NUT reports OB or LB for this long, the controller starts shutdown steps.
on_battery_delay_seconds = 30
poll_interval_seconds = 15
stop_timeout_seconds = 180
# Each agent can expose this script to shut down its Ubuntu host after stop.
downstream_shutdown_script = "shutdown_host"
local_shutdown_delay_seconds = 15
local_shutdown_command = ["/usr/bin/systemctl", "poweroff"]

[[servers]]
id = "survival"
name = "Survival"
agent_url = "http://192.168.1.31:8766"
token_env = "MC_AGENT_TOKEN_HOST1"

[[servers]]
id = "creative"
name = "Creative"
agent_url = "http://192.168.1.32:8766"
token_env = "MC_AGENT_TOKEN_HOST2"
